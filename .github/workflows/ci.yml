name: CI Pipeline

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  forensic-scan:
    name: Forensic Scan & Typing Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Poetry
        run: |
          pip install poetry
      - name: Install dependencies
        run: |
          poetry install
      - name: Run Black (code style)
        run: |
          poetry run black --check src/ tests/
      - name: Run isort (import order)
        run: |
          poetry run isort --check-only src/ tests/
      - name: Run mypy (type checking)
        run: |
          poetry run mypy src/
      - name: Run Pytest (unit & integration tests)
        run: |
          poetry run pytest

  judicial-integrity:
    name: Judicial Integrity & Governance
    runs-on: ubuntu-latest
    needs: forensic-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Poetry
        run: |
          pip install poetry
      - name: Install dependencies
        run: |
          poetry install
      - name: Validate Conventional Commits
        uses: webiny/action-conventional-commits@v1.2.0
      - name: Check for .env.example
        run: |
          test -f .env.example
      - name: Check for pyproject.toml and poetry.lock
        run: |
          test -f pyproject.toml && test -f poetry.lock

  elite-tier:
    name: Elite Tier Checks
    runs-on: ubuntu-latest
    needs: judicial-integrity
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Poetry
        run: |
          pip install poetry
      - name: Install dependencies
        run: |
          poetry install
      - name: LangSmith Integration (stub)
        run: |
          echo "LangSmith integration would run here."
      - name: Git Narrative Validation (stub)
        run: |
          echo "Git narrative validation would run here."
