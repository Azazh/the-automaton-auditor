name: CI Pipeline

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  forensic-scan:
    name: Forensic Scan & Typing Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies (strict lock)
        run: uv pip install -r requirements.txt
      - name: Run Black (code style)
        run: uv pip run black --check src/ tests/
      - name: Run isort (import order)
        run: uv pip run isort --check-only src/ tests/
      - name: Run mypy (type checking)
        run: uv pip run mypy src/
      - name: Run Pytest (unit & integration tests)
        run: uv pip run pytest

  judicial-integrity:
    name: Judicial Integrity & Governance
    runs-on: ubuntu-latest
    needs: forensic-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies (strict lock)
        run: uv pip install -r requirements.txt
      - name: Validate Conventional Commits
        uses: webiny/action-conventional-commits@v1.2.0
      - name: Check for .env.example
        run: test -f .env.example
      - name: Check for pyproject.toml, poetry.lock, requirements.txt
        run: test -f pyproject.toml && test -f poetry.lock && test -f requirements.txt

  elite-tier:
    name: Elite Tier Checks
    runs-on: ubuntu-latest
    needs: judicial-integrity
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install uv
        run: pip install uv
      - name: Install dependencies (strict lock)
        run: uv pip install -r requirements.txt
      - name: LangSmith Integration (stub)
        run: echo "LangSmith integration would run here."
      - name: Git Narrative Validation (stub)
        run: echo "Git narrative validation would run here."
